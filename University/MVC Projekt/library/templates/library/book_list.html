{% extends 'library/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Lista Książek</h2>
    <a href="{% url 'book_create' %}" class="btn btn-primary">➕ Dodaj Nową Książkę</a>
</div>
<div class="card shadow-sm">
    <div class="card-body">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Tytuł</th>
                    <th>Autor</th>
                    <th>Rok wydania</th>
                    <th>Akcje</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr>
                    <td><strong>{{ book.title }}</strong></td>
                    <td>{{ book.author }}</td>
                    <td>{{ book.year }}</td>
                    <td>
                        <a href="{% url 'book_detail' book.pk %}" class="btn btn-sm btn-info text-white">Podgląd</a>
                        <a href="{% url 'book_edit' book.pk %}" class="btn btn-sm btn-warning">Edytuj</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center text-muted">Brak książek w bazie danych.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
